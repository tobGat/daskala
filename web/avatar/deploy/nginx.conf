# avatar.schulapps.at – statischer Avatar-Editor.
# certbot ergänzt beim ersten Lauf den 443-Block + http→https-Redirect automatisch.
server {
    listen 80;
    listen [::]:80;
    server_name avatar.schulapps.at;

    root /var/www/avatar;
    index index.html;

    include snippets/security-headers-default.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
