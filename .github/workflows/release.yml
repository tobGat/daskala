# Release-Pipeline für Daskala.
# Wird ausgelöst, sobald ein Versions-Tag (z. B. v1.0.53) gepusht wird.
# GitHub baut dann Windows- UND Linux-Pakete und legt sie im selben (Entwurfs-)Release ab –
# ohne lokalen Build und ohne persönlichen Token (nutzt den eingebauten GITHUB_TOKEN).
# Der native better-sqlite3 muss je Zielsystem gebaut werden, deshalb ein eigener Runner pro OS.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Nacheinander: Windows legt den Release-Entwurf an, Ubuntu hängt seine
      # Artefakte an denselben Entwurf an (verhindert doppelte Entwürfe zum Tag).
      max-parallel: 1
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Version aus dem Tag übernehmen
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Bauen & als Entwurfs-Release veröffentlichen
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
